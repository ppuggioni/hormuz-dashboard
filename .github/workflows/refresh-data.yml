name: Refresh Hormuz Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: hormuz-refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Rebuild processed data
        env:
          HORMUZ_INDEX_URL: https://hzxiwdylvefcsuaafnhj.supabase.co/storage/v1/object/public/x-scrapes-public/hormuz/index.json
        run: npm run build:data

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebase on latest main to avoid non-fast-forward push failures.
          git pull --rebase origin main

          if git diff --quiet public/data/processed.json; then
            echo "No data changes."
            exit 0
          fi

          git add public/data/processed.json
          git commit -m "chore(data): refresh hormuz processed dataset"

          # Retry once in case another commit lands between commit and push.
          if ! git push origin HEAD:main; then
            git pull --rebase origin main
            git push origin HEAD:main
          fi
